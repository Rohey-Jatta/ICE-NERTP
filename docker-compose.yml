services:
  # PostgreSQL 16 with PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: iec_postgres
    environment:
      POSTGRES_DB: iec_nertp
      POSTGRES_USER: iec_user
      POSTGRES_PASSWORD: secure_password_change_this
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - iec_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iec_user -d iec_nertp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: iec_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - iec_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP-FPM 8.3
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: iec_php
    working_dir: /var/www
    volumes:
      # - ./:/var/www
      - .:/var/www:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    # dns:
    # - 8.8.8.8
    # - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iec_network
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: iec_nertp
      DB_USERNAME: iec_user
      DB_PASSWORD: secure_password_change_this
      REDIS_HOST: redis
      REDIS_PORT: 6379

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: iec_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - iec_network

  # Laravel Horizon (Queue Worker)
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: iec_horizon
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan horizon
    depends_on:
      - php
      - redis
    networks:
      - iec_network
    restart: unless-stopped

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: iec_minio
    ports:
      - "9000:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - iec_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  iec_network:
    driver: bridge
